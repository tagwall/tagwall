<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Tagwall — soon.</title>
  <meta name="description" content="An immutable on-chain graffiti wall. Coming to PulseChain, Ethereum, Base, and BSC.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;600&display=swap">
  <style>
    :root {
      --bg: #0a0b0a;
      --bg-panel: #0f1110;
      --text: #e6e6e6;
      --text-dim: #8a8a8a;
      --accent: #a8ff2e;
      --accent-2: #7bd42a;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.5rem;
      max-width: 38rem;
      width: 100%;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-family: var(--mono);
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    .brand-mark {
      display: inline-block;
      width: 14px;
      height: 14px;
      background: var(--accent);
      box-shadow: 0 0 6px color-mix(in srgb, var(--accent) 53%, transparent);
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.85;
    }
    h1 {
      font-family: var(--mono);
      font-weight: 600;
      font-size: clamp(2rem, 6vw, 3.25rem);
      line-height: 1.05;
      margin: 0;
    }
    p {
      font-family: var(--sans);
      font-size: 1rem;
      line-height: 1.55;
      color: var(--text-dim);
      margin: 0;
    }
    .chains {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .chains > span { white-space: nowrap; }
    .ctas {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      border: 1px solid color-mix(in srgb, var(--text-dim) 60%, transparent);
      border-radius: 2px;
      background: var(--bg-panel);
      color: var(--text);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
    }
    .cta:hover { border-color: var(--text); }
    .cta-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }
    .cta-primary:hover {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: var(--bg);
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>tagwall.io</span>
    </div>
    <div class="eyebrow">— soon —</div>
    <h1>Immutable. On chain. Forever.</h1>
    <p>
      A graffiti wall. Pick a square. Make it permanent.<br>
      Coming to PulseChain, Ethereum, Base, and BSC the same day.
    </p>
    <div class="chains">
      <span>PulseChain</span><span>·</span>
      <span>Ethereum</span><span>·</span>
      <span>Base</span><span>·</span>
      <span>BSC</span>
    </div>
    <div class="ctas">
      <a class="cta cta-primary" href="https://x.com/tagwall_io" target="_blank" rel="noopener noreferrer">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M12.12 1.5h2.38l-5.2 5.93L15.4 14.5h-4.78l-3.75-4.9-4.28 4.9H.2l5.56-6.34L.34 1.5h4.9l3.4 4.48 3.48-4.48zm-.83 11.57h1.32L4.76 2.86H3.35l7.94 10.2z"/>
        </svg>
        <span>Follow for launch</span>
      </a>
    </div>
  </main>
</body>
</html>
