name: Tweets bot

# Scans all five EVM chains every 30 min for new Painted events,
# writes per-paint tweet candidates to bots/tweets/QUEUE.md +
# web/public/queue.json, and writes a trailing-7-day per-chain
# summary to web/public/summary.json. Both JSON files are rendered
# by tagwall.io/tweets.
#
# Named "tweets" because that's what it produces — even though the
# final step (paste-and-post on X) is still operator-driven. Was
# "manual-queue" through the May 2026 launch when most of the
# automation around it didn't exist yet.
#
# Replaces the original auto-posting twitter-bot workflow. X moved to
# a paid pay-per-use API in Feb 2026 (~$0.20 per tweet with a URL),
# so this version surfaces ready-to-post tweet copy on a page rather
# than posting from a bot account directly.
#
# Runs on GitHub Actions against the public mirror at
# github.com/tagwall/tagwall. Bot commits land here directly,
# Cloudflare Worker picks them up via build-watch-paths and rebuilds
# the static site.

on:
  schedule:
    # Every 30 minutes. GitHub's scheduler is best-effort; expect drift
    # of a few minutes during peak load. Acceptable for an
    # amplification surface that gets reviewed manually anyway.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print queue entries, do not write files or push)'
        type: boolean
        default: false

# Concurrency guard: never let two runs race on state.json or QUEUE.md.
# Newer scheduled runs cancel an in-flight one; manual dispatches always
# wait for the in-flight to finish so the operator gets a clean
# diagnostic instead of a silent kill.
concurrency:
  group: tweets-bot
  cancel-in-progress: ${{ github.event_name == 'schedule' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # to commit state.json + QUEUE.md + queue.json + summary.json back
      discussions: write   # paint-alert notifier posts one Discussion per new paint
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't persist the GITHUB_TOKEN into .git/config: later steps
          # run pip-installed third-party code, and the write token
          # should only exist in the push step's env, not on disk.
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: bots/tweets/requirements.txt

      - name: Install deps
        working-directory: bots/tweets
        run: pip install --quiet -r requirements.txt

      - name: Run scanner
        working-directory: bots/tweets
        env:
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          CANVAS_ADDRESS:            ${{ vars.CANVAS_ADDRESS }}
          PULSECHAIN_RPC_URL:        ${{ vars.PULSECHAIN_RPC_URL }}
          # Defaults to https://eth.drpc.org inside main.py if both
          # secret and variable are empty. Secret takes priority over
          # variable so a paid provider URL with an embedded API key
          # gets log-masking. Public override URLs (no key) can live as
          # a variable instead.
          ETHEREUM_RPC_URL:          ${{ secrets.ETHEREUM_RPC_URL || vars.ETHEREUM_RPC_URL }}
          BASE_RPC_URL:              ${{ vars.BASE_RPC_URL }}
          BSC_RPC_URL:               ${{ vars.BSC_RPC_URL }}
          # Optional; bot defaults to hyperliquid.rpc.blxrbdn.com if unset.
          HYPEREVM_RPC_URL:          ${{ vars.HYPEREVM_RPC_URL }}
          TAGWALL_BASE_URL:          ${{ vars.TAGWALL_BASE_URL }}
          # Canonical names (current). The bot also accepts the
          # MANUAL_QUEUE_* names for backward compatibility with any
          # GitHub variable already configured under the old labels.
          TWEETS_MIN_PIXELS:         ${{ vars.TWEETS_MIN_PIXELS || vars.MANUAL_QUEUE_MIN_PIXELS }}
          TWEETS_MAX_PER_RUN:        ${{ vars.TWEETS_MAX_PER_RUN || vars.MANUAL_QUEUE_MAX_PER_RUN }}
        run: python main.py

      # Phone push for new paints. Separate step + stdlib-only notify.py so
      # the discussions-scoped GITHUB_TOKEN never enters the scanner step
      # (which runs third-party pip code). No-op unless the PAINT_ALERT_GH_USER
      # repo variable is set, so it stays dormant by default. Paint data
      # reaches GitHub as parameterized GraphQL variables, never shell, so
      # there's no injection surface from on-chain content.
      - name: Notify new paints (GitHub Discussions)
        if: ${{ !inputs.dry_run }}
        working-directory: bots/tweets
        env:
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          PAINT_ALERT_GH_USER:   ${{ vars.PAINT_ALERT_GH_USER }}
          PAINT_ALERT_CATEGORY:  ${{ vars.PAINT_ALERT_CATEGORY }}
        run: python notify.py

      - name: Commit scan results
        if: ${{ !inputs.dry_run }}
        env:
          # Scoped to this step only (checkout ran with
          # persist-credentials: false), so the write token never sits
          # in .git/config while third-party code runs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Files the bot may touch. Some may not exist on disk if
          # this is the first real run after a clean publish (the
          # publish allowlist excludes state.json + QUEUE.md so they
          # don't ship from local), or if the bot exited before
          # reaching its writers. `git diff --quiet PATH` errors when
          # PATH isn't in HEAD or working tree, so filter to existing
          # files before any git command sees them.
          BOT_FILES=(
            bots/tweets/state.json
            bots/tweets/QUEUE.md
            bots/tweets/founders_state.json
            web/public/queue.json
            web/public/summary.json
            web/public/leaderboard.json
          )
          EXISTING=()
          for f in "${BOT_FILES[@]}"; do
            [ -f "$f" ] && EXISTING+=("$f")
          done
          if [ ${#EXISTING[@]} -eq 0 ]; then
            echo "Bot wrote no recognised output files this run; nothing to commit."
            exit 0
          fi

          # `git status --porcelain` includes untracked files (a freshly
          # written state.json on first run is untracked, not modified),
          # which `git diff` would miss. Empty output → nothing changed.
          CHANGES=$(git status --porcelain -- "${EXISTING[@]}")
          if [ -z "$CHANGES" ]; then
            echo "no queue or state change"
            exit 0
          fi

          # Author identity matches publish-public.sh's EMAIL_ALLOWLIST
          # so the public-repo commit log stays uniform (bot commits
          # and operator-driven publish commits look the same).
          git config user.name 'tagwall'
          git config user.email 'noreply@tagwall.io'
          git add "${EXISTING[@]}"
          git commit -m "bot: append notable paints"
          # An operator publish (or the previous bot tick) can land on
          # main mid-run; rebase the bot commit on top instead of
          # failing the push. The repo is public, so the fetch side of
          # the pull needs no credentials. Never force-push.
          git pull --rebase "https://github.com/${GITHUB_REPOSITORY}.git" main
          # Authenticate explicitly and only at push time, using the
          # step-scoped GITHUB_TOKEN (contents: write from the job-level
          # permissions block above).
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
