name: Manual tweet queue

# Replaces the auto-posting twitter-bot workflow. X moved to a paid
# pay-per-use API in Feb 2026 (~$0.20 per tweet with a URL), so this
# version writes notable paints to bots/manual-queue/QUEUE.md and to
# web/public/{queue,summary}.json (consumed by tagwall.io/tweets) rather
# than posting to X. Operator reviews and posts manually.
#
# This workflow runs on GitHub Actions, against the public mirror at
# github.com/tagwall/tagwall. The operator's private GitLab carries
# the full project (PRD, contracts, docs); GitHub carries the slice
# the bot + frontend need. Bot commits land on GitHub directly,
# Cloudflare Worker picks them up on its build-watch-paths trigger.

on:
  schedule:
    # Every 30 minutes. GitHub's scheduler is best-effort; expect drift
    # of a few minutes during peak load. Acceptable for a community-
    # amplification queue that's reviewed manually anyway.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print queue entries, do not write QUEUE.md)'
        type: boolean
        default: false

# Concurrency guard: never let two runs race on state.json or QUEUE.md.
# Newer scheduled runs cancel an in-flight one; manual dispatches always
# wait for the in-flight to finish so the operator gets a clean
# diagnostic instead of a silent kill.
concurrency:
  group: manual-queue
  cancel-in-progress: ${{ github.event_name == 'schedule' }}

jobs:
  queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit state.json + QUEUE.md back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: bots/manual-queue/requirements.txt

      - name: Install deps
        working-directory: bots/manual-queue
        run: pip install --quiet -r requirements.txt

      - name: Run scanner
        working-directory: bots/manual-queue
        env:
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          CANVAS_ADDRESS:            ${{ vars.CANVAS_ADDRESS }}
          PULSECHAIN_RPC_URL:        ${{ vars.PULSECHAIN_RPC_URL }}
          ETHEREUM_RPC_URL:          ${{ secrets.ETHEREUM_RPC_URL }}
          BASE_RPC_URL:              ${{ vars.BASE_RPC_URL }}
          BSC_RPC_URL:               ${{ vars.BSC_RPC_URL }}
          TAGWALL_BASE_URL:          ${{ vars.TAGWALL_BASE_URL }}
          MANUAL_QUEUE_MIN_PIXELS:   ${{ vars.MANUAL_QUEUE_MIN_PIXELS }}
          MANUAL_QUEUE_MAX_PER_RUN:  ${{ vars.MANUAL_QUEUE_MAX_PER_RUN }}
        run: python main.py

      - name: Commit queue + state
        if: ${{ !inputs.dry_run }}
        run: |
          if git diff --quiet \
                bots/manual-queue/state.json \
                bots/manual-queue/QUEUE.md \
                web/public/queue.json \
                web/public/summary.json; then
            echo "no queue or state change"
            exit 0
          fi
          # Author identity matches publish-public.sh's EMAIL_ALLOWLIST
          # so the public-repo commit log stays uniform (bot commits
          # and operator-driven publish commits look the same).
          git config user.name 'tagwall'
          git config user.email 'noreply@tagwall.io'
          git add \
            bots/manual-queue/state.json \
            bots/manual-queue/QUEUE.md \
            web/public/queue.json \
            web/public/summary.json
          git commit -m "bot: append notable paints to manual queue"
          # GITHUB_TOKEN with `contents: write` on this repo (granted by
          # the job-level permissions block above) is automatically
          # configured as the push credential by actions/checkout@v4.
          git push
