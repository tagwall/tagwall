name = "tagwall"
compatibility_date = "2026-05-03"

# Workers Static Assets. Day-0 launch posture (2026-05-24): serves the
# built canvas bundle from `./web/dist`. Cloudflare's git integration
# runs the build below on every push.
#
# Pre-launch the directory was `./holding/` (static HTML placeholder);
# the holding/ folder is retained in-repo as historical reference but
# is no longer served.
[build]
command = "npm --prefix web ci && npm --prefix web run build"

[assets]
directory = "./web/dist"
not_found_handling = "single-page-application"
